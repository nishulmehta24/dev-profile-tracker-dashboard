name: Deploy React Client to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'client/**'
      - '.github/workflows/deploy.yml'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'client/package.json'

      - name: Install Client Dependencies
        run: npm ci
        working-directory: client

      - name: Compile Production Build
        run: npm run build
        working-directory: client
        env:
          VITE_SERVER_URL: 'https://devpulse-backend-t8zt.onrender.com/api'

      - name: Deploy Compiled static assets to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: client/dist
          branch: gh-pages # Deploys static build to dedicated hosting branch
